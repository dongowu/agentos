workflows:
  mvp:
    name: MVP
    stages:
      - id: prd
        name: PRD
        agent: pm
        outputs:
          - type: prd
            name: PRD.md
      - id: implementation
        name: Implementation
        agent: coder
        collaborators: [pm]
        inputs:
          - fromStage: prd
            type: prd
        outputs:
          - type: source-code
            name: source.md

  default:
    name: Default
    stages:
      - id: prd
        name: PRD
        agent: pm
        collaborators: [architect]
        outputs:
          - type: prd
            name: PRD.md
          - type: acceptance-criteria
            name: acceptance-criteria.md
      - id: alignment
        name: Alignment
        agent: architect
        collaborators: [pm, coder, reviewer, tester]
        inputs:
          - fromStage: prd
            type: prd
          - fromStage: prd
            type: acceptance-criteria
        outputs:
          - type: discussion-summary
            name: alignment-summary.md
      - id: design
        name: Design
        agent: architect
        collaborators: [coder]
        inputs:
          - fromStage: alignment
            type: discussion-summary
        outputs:
          - type: tech-design
            name: tech-design.md
          - type: task-list
            name: tasks.md
      - id: implementation
        name: Implementation
        agent: coder
        collaborators: [architect]
        inputs:
          - fromStage: design
            type: tech-design
          - fromStage: design
            type: task-list
        outputs:
          - type: source-code
            name: source.md
      - id: review
        name: Review
        agent: reviewer
        collaborators: [coder]
        inputs:
          - fromStage: implementation
            type: source-code
        outputs:
          - type: review-report
            name: review.md
      - id: testing
        name: Testing
        agent: tester
        collaborators: [coder]
        inputs:
          - fromStage: implementation
            type: source-code
          - fromStage: review
            type: review-report
        outputs:
          - type: test-report
            name: testing.md

  autonomy:
    name: Autonomy
    stages:
      - id: implementation
        name: Implementation
        agent: coder
        collaborators: [architect]
        outputs:
          - type: source-code
            name: source.md
      - id: review
        name: Review
        agent: reviewer
        collaborators: [coder]
        inputs:
          - fromStage: implementation
            type: source-code
        outputs:
          - type: review-report
            name: review.md
      - id: testing
        name: Testing
        agent: tester
        collaborators: [coder]
        inputs:
          - fromStage: implementation
            type: source-code
          - fromStage: review
            type: review-report
        outputs:
          - type: test-report
            name: testing.md
