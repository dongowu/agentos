gate_policy: unanimous
arbiter_policy: two_round
merge_policy: strict
merge_auto_rework: false
max_merge_retries: 1
merge_rework_routes:
  generic:
    route_name: generic
    task_suffix: generic
    team_id: program_board
    role: supervisor@supervisor.primary
    actor_summary: supervisor
  code-conflict:
    route_name: code-conflict
    task_suffix: code
    team_id: platform_team
    role: architect@architect.primary
    actor_summary: platform architect
  api-conflict:
    route_name: api-conflict
    task_suffix: api
    team_id: feature_team
    role: architect@architect.primary
    actor_summary: feature architect
  test-conflict:
    route_name: test-conflict
    task_suffix: test
    team_id: qa_team
    role: tester@tester.primary
    actor_summary: qa lead
merge_rework_rules:
  - marker: "[[merge:code-conflict]]"
    route_key: code-conflict
    priority: 10
    condition_mode: all
  - marker: "[[merge:api-conflict]]"
    route_key: api-conflict
    priority: 20
    condition_mode: all
    required_risk_level: low
    min_retry_round: 1
    max_team_load: 5
    condition_expression: "retry>=1 && team_load>=2"
  - marker: "[[merge:test-conflict]]"
    route_key: test-conflict
    priority: 30
    condition_mode: all
  - marker: "[[merge:conflict]]"
    route_key: generic
    priority: 100
    condition_mode: all
role_failover: false
max_role_attempts: 2
team_topology: single
max_parallel_teams: 1
role_instances:
  coder:
    - coder.primary
    - coder.backup
