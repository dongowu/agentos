syntax = "proto3";

package agentos.v1;

option go_package = "github.com/dongowu/agentos/api/gen/agentos/v1;v1";

service WorkerRegistry {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
}

message RegisterRequest {
  string worker_id = 1;
  string addr = 2;
  repeated string capabilities = 3;
  int32 max_tasks = 4;
}

message RegisterResponse {
  bool accepted = 1;
}

message HeartbeatRequest {
  string worker_id = 1;
  int32 active_tasks = 2;
}

message HeartbeatResponse {
  bool ok = 1;
}

message DeregisterRequest {
  string worker_id = 1;
}

message DeregisterResponse {
  bool ok = 1;
}

message ListWorkersRequest {
  bool available_only = 1;
}

message WorkerSnapshot {
  string worker_id = 1;
  string addr = 2;
  repeated string capabilities = 3;
  string status = 4;
  int32 active_tasks = 5;
  int32 max_tasks = 6;
  int64 last_heartbeat_unix = 7;
}

message ListWorkersResponse {
  repeated WorkerSnapshot workers = 1;
}
