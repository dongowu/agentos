# AgentOS Agent Config
# Coding-focused agent for implementation and refactoring work.

name: coding-agent
description: "Implements changes, edits files, and validates code with a practical software-team workflow."

model: gpt-4o-mini

memory:
  type: redis
  ttl: 28800

tools:
  - file.read
  - file.write
  - git.commit
  - git.diff
  - shell.exec
  - browser.search

policy:
  allow: ["file.*", "git.*", "browser.*"]
  deny: ["shell.rm"]

workflow:
  - plan
  - execute
  - reflect
